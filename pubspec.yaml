name: smart_passenger_alert
description: AI-powered Smart Travel Assistant with Flight Delay Prediction & Smartwatch Integration

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0
  retrofit: ^4.0.0
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  
  # UI & Animations
  lottie: ^2.6.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.2.0
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  
  # Charts & Data Visualization
  fl_chart: ^0.71.0
  syncfusion_flutter_charts: ^23.1.36
  
  # Date & Time
  intl: ^0.18.1
  timezone: ^0.10.1
  
  # Device Info & Sensors
  device_info_plus: ^9.1.1
  sensors_plus: ^6.1.2
  flutter_blue_plus: ^1.35.5
  
  # Notification & Alert
  flutter_local_notifications: ^19.4.2
  
  # Utilities
  get: ^4.6.5
  uuid: ^4.0.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  
  # QR & Barcode
  qr_flutter: ^4.1.0
  
  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.4
  
  # Gesture & Haptics
  vibration: ^3.1.8
  
  # Icons
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0
  permission_handler: ^11.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/
